name: Update WA-JS

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      wa_js_version:
        description: "WA-JS release tag to test, or latest"
        required: true
        default: "latest"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Validate latest WA-JS release
    runs-on: ubuntu-latest
    env:
      WA_JS_VERSION: ${{ inputs.wa_js_version || 'latest' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.15.0

      - name: Install dependencies
        run: npm install

      - name: Download WA-JS release asset
        env:
          WA_JS_WRITE_METADATA: "true"
        run: node scripts/download-wa-js-release.js

      - name: Validate locale JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('public/_locales/en/messages.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('public/_locales/pt_BR/messages.json','utf8'))"

      - name: Build extension
        run: npm run build

      - name: Create WA-JS update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update wa-js release"
          title: "chore: update wa-js release"
          body: |
            ## Summary
            - Downloads and validates the latest wppconnect-team/wa-js release asset.
            - Updates `wa-js-release.json` so the extension tracks the validated WA-JS release.

            ## Validation
            - npm install
            - node scripts/download-wa-js-release.js
            - locale JSON parse check
            - npm run build
          branch: chore/update-wa-js-release
          delete-branch: true
          labels: dependencies
