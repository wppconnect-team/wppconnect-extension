name: Release Chrome extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    env:
      RELEASE_MESSAGE: ${{ github.event.head_commit.message || 'Manual release' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump extension version
        run: |
          CURRENT_VERSION="$(node -p "require('./public/manifest.json').version")"
          npm pkg set version="$CURRENT_VERSION"

          if [[ "$RELEASE_MESSAGE" =~ "#major" ]]; then
            npm version major --no-git-tag-version
          elif [[ "$RELEASE_MESSAGE" =~ "#minor" ]]; then
            npm version minor --no-git-tag-version
          else
            npm version patch --no-git-tag-version
          fi

          VERSION="$(npm pkg get version | tr -d '"')"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          VERSION="$VERSION" node -e "const fs=require('fs'); const file='public/manifest.json'; const manifest=JSON.parse(fs.readFileSync(file,'utf8')); manifest.version=process.env.VERSION; fs.writeFileSync(file, JSON.stringify(manifest, null, 2) + '\n');"

      - name: Install dependencies
        run: npm install

      - name: Validate locale JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('public/_locales/en/messages.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('public/_locales/pt_BR/messages.json','utf8'))"

      - name: Build extension
        run: npm run build

      - name: Validate built manifest
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('dist/manifest.json', 'utf8'));
          const validVersion = /^(?:0|[1-9]\d*)(?:\.(?:0|[1-9]\d*)){0,3}$/.test(manifest.version || '');
          if (!validVersion) {
            throw new Error(`Invalid Chrome extension version: ${manifest.version || '<missing>'}`);
          }
          NODE

      - name: Create extension zip
        run: |
          cd dist
          zip -r "../wppconnect-extension-v${{ env.VERSION }}.zip" .

      - name: Commit version bump
        run: |
          git add package.json public/manifest.json
          git commit -m "chore: release v${{ env.VERSION }} [skip ci]"
          git tag "v${{ env.VERSION }}"
          git push origin HEAD:main
          git push origin "v${{ env.VERSION }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "Release v${{ env.VERSION }}"
          body: ${{ env.RELEASE_MESSAGE }}
          files: "wppconnect-extension-v${{ env.VERSION }}.zip"
